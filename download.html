<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download — Sunny Boss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241f18;
    --parchment:#f1e6cd;
    --parchment-dark:#e4d3ac;
    --indigo:#1f2a44;
    --indigo-deep:#141b2e;
    --stamp:#a8332b;
    --stamp-dark:#8a2a23;
    --gold:#bd9433;
    --cream:#f7f1e3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, rgba(189,148,51,0.15), transparent 60%),
      var(--indigo-deep);
    color:var(--cream);
    font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:20px;
  }
  .card{
    background:var(--parchment);
    color:var(--ink);
    max-width:420px;
    width:100%;
    border-radius:16px;
    padding:34px 26px 28px;
    text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,0.4);
    border:1px solid var(--parchment-dark);
  }
  .badge{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    color:var(--gold);
    background:var(--indigo);
    border-radius:999px;
    padding:5px 14px;
    margin-bottom:20px;
  }
  .icon{
    width:68px;height:68px;
    border-radius:14px;
    background:var(--indigo);
    color:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:30px;
    margin:0 auto 18px;
    box-shadow:0 6px 16px rgba(31,42,68,0.3);
  }
  h1{
    font-family:'Baloo 2',sans-serif;
    font-size:21px;
    line-height:1.3;
    margin:0 0 6px;
    word-break:break-word;
  }
  .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:rgba(36,31,24,0.55);
    margin-bottom:28px;
    word-break:break-word;
  }

  .download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    background:var(--stamp);
    color:var(--cream);
    font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;
    font-weight:700;
    font-size:16px;
    padding:17px 20px;
    border-radius:10px;
    text-decoration:none;
    border:none;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(168,51,43,0.35);
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .download-btn svg{flex-shrink:0;}
  .download-btn:hover{
    background:var(--stamp-dark);
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(168,51,43,0.45);
  }
  .download-btn:active{transform:translateY(0px) scale(0.98);}
  .download-btn:focus-visible{outline:3px solid var(--gold); outline-offset:3px;}

  .back{
    display:inline-block;
    margin-top:20px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    color:var(--indigo);
    text-decoration:none;
    border-bottom:1px dashed rgba(31,42,68,0.4);
    padding-bottom:2px;
  }
  .back:hover{color:var(--stamp); border-color:var(--stamp);}

  .note{
    margin-top:16px;
    font-size:11.5px;
    color:rgba(36,31,24,0.5);
    line-height:1.5;
  }

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">SUNNY BOSS ARCHIVE</span>
    <div class="icon" id="fileIcon">📘</div>
    <h1 id="fileName">File</h1>
    <div class="sub" id="fileSub">—</div>

    <a class="download-btn" id="downloadLink" href="#" download>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="M6 11l6 6 6-6"/><path d="M5 21h14"/></svg>
      <span id="btnLabel">Download Now</span>
    </a>

    <div class="note">File seedha aapke device par save hoga.</div>
    <a class="back" href="index.html">← Sabhi files par wapas jaao</a>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file") || "";
  const name = params.get("name") || file || "File";
  const sub = params.get("sub") || "";
  const icon = params.get("icon") || "📄";

  document.getElementById("fileIcon").textContent = icon;
  document.getElementById("fileName").textContent = name;
  document.getElementById("fileSub").textContent = sub;

  const link = document.getElementById("downloadLink");
  const label = document.getElementById("btnLabel");
  if(file){
    link.href = file;
    link.setAttribute("download", file);
  } else {
    link.removeAttribute("href");
    link.style.opacity = "0.5";
    link.style.cursor = "not-allowed";
    label.textContent = "File link missing";
  }
</script>
</body>
</html>
