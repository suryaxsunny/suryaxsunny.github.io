<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download — FileGhar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --surface:#f7f8fa;
    --text:#15171c;
    --muted:#767a85;
    --accent:#2563eb;
    --accent-soft:#eaf0ff;
    --border:#e6e8ec;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 28px;
    border-bottom:1px solid var(--border);
  }
  .topbar-brand{
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--text);
    text-decoration:none;
  }
  .topbar-back{
    font-size:13px;
    color:var(--muted);
    text-decoration:none;
    font-weight:500;
  }
  .topbar-back:hover{color:var(--accent);}

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:56px 24px 80px;
    display:grid;
    grid-template-columns:1fr;
    gap:0;
  }

  @media (min-width:760px){
    .wrap{
      grid-template-columns:280px 1fr;
      gap:48px;
      align-items:start;
    }
  }

  .left-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  @media (min-width:760px){
    .left-col{
      align-items:flex-start;
      text-align:left;
      position:sticky;
      top:56px;
    }
  }

  .dl-icon{
    width:110px;
    height:110px;
    border-radius:28px;
    background:var(--accent-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    margin-bottom:24px;
  }

  .dl-type-label{
    font-size:12px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:10px;
  }

  .dl-name{
    font-family:'Sora',sans-serif;
    font-size:clamp(24px,4vw,30px);
    font-weight:800;
    line-height:1.25;
    margin-bottom:8px;
  }

  .right-col{
    border-top:1px solid var(--border);
    margin-top:36px;
    padding-top:36px;
  }
  @media (min-width:760px){
    .right-col{border-top:none;margin-top:0;padding-top:0;}
  }

  .detail-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 0;
    border-bottom:1px solid var(--border);
    font-size:14px;
  }
  .detail-row:first-child{padding-top:0;}
  .detail-label{color:var(--muted);}
  .detail-value{
    font-family:'JetBrains Mono',monospace;
    font-weight:500;
    color:var(--text);
  }

  .dl-download-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    background:var(--accent);
    color:#fff;
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:16px;
    border:none;
    border-radius:14px;
    padding:18px 0;
    margin-top:28px;
    cursor:pointer;
    text-decoration:none;
    transition:background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 8px 24px rgba(37,99,235,0.22);
  }
  .dl-download-btn:hover{
    background:#1d4fd1;
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(37,99,235,0.3);
  }

  .dl-note{
    margin-top:16px;
    font-size:13px;
    color:var(--muted);
    text-align:center;
  }

  .safety-box{
    margin-top:32px;
    background:var(--surface);
    border-radius:14px;
    padding:18px 20px;
    font-size:13px;
    color:var(--muted);
    line-height:1.6;
  }
  .safety-box b{color:var(--text);}
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="topbar-brand">FileGhar</a>
    <a href="index.html" class="topbar-back">← Sabhi files</a>
  </div>

  <div class="wrap">

    <div class="left-col">
      <div class="dl-icon" id="dlIcon">📘</div>
      <div class="dl-type-label" id="dlType">PDF</div>
      <div class="dl-name" id="dlName">File ka naam</div>
    </div>

    <div class="right-col">
      <div class="detail-row">
        <span class="detail-label">File Type</span>
        <span class="detail-value" id="dlTypeRow">PDF</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Size</span>
        <span class="detail-value" id="dlSizeRow">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Details</span>
        <span class="detail-value" id="dlExtraRow">-</span>
      </div>

      <a href="#" class="dl-download-btn" id="dlActualLink">⬇ Download Now</a>
      <div class="dl-note">File seedha aapke device par save hoga.</div>

      <div class="safety-box">
        <b>Note:</b> Yeh file sirf jaankari aur shaikshanik upyog ke liye di gayi hai. Download se pehle file ka naam aur size zaroor check kar lein.
      </div>
    </div>

  </div>

<script>
  function getParam(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
  }

  const name = getParam('name') || 'File';
  const type = getParam('type') || 'FILE';
  const size = getParam('size') || '-';
  const extra = getParam('extra') || '-';
  const link = getParam('link') || '#';

  document.getElementById('dlName').textContent = name;
  document.getElementById('dlType').textContent = type;
  document.getElementById('dlTypeRow').textContent = type;
  document.getElementById('dlSizeRow').textContent = size;
  document.getElementById('dlExtraRow').textContent = extra;
  document.getElementById('dlIcon').textContent = type.toUpperCase() === 'APK' ? '📱' : '📘';
  document.getElementById('dlActualLink').setAttribute('href', link);
  document.title = name + ' — Download';
</script>

</body>
</html>
