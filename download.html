<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download — FileGhar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --surface:#f7f8fa;
    --text:#15171c;
    --muted:#767a85;
    --accent:#2563eb;
    --accent-soft:#eaf0ff;
    --border:#e6e8ec;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  .hero{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:48px 24px;
  }

  .dl-icon{
    width:120px;
    height:120px;
    border-radius:32px;
    background:var(--accent-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:52px;
    margin-bottom:32px;
  }

  .dl-type-label{
    font-family:'Inter',sans-serif;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:12px;
  }

  .dl-name{
    font-family:'Sora',sans-serif;
    font-size:clamp(26px,5vw,38px);
    font-weight:800;
    line-height:1.2;
    max-width:600px;
    margin-bottom:14px;
  }

  .dl-meta{
    font-size:15px;
    color:var(--muted);
    margin-bottom:40px;
  }
  .dl-meta b{color:var(--text);font-weight:600;}

  .dl-download-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--accent);
    color:#fff;
    font-family:'Sora',sans-serif;
    font-weight:700;
    font-size:17px;
    border:none;
    border-radius:14px;
    padding:19px 48px;
    cursor:pointer;
    text-decoration:none;
    transition:background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 8px 24px rgba(37,99,235,0.25);
  }
  .dl-download-btn:hover{
    background:#1d4fd1;
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(37,99,235,0.32);
  }

  .dl-note{
    margin-top:18px;
    font-size:13px;
    color:var(--muted);
  }

  footer{
    text-align:center;
    padding:28px 24px;
    border-top:1px solid var(--border);
  }
  .dl-back{
    font-size:14px;
    color:var(--muted);
    text-decoration:none;
    font-weight:500;
  }
  .dl-back:hover{color:var(--accent);}
</style>
</head>
<body>

  <div class="hero">
    <div class="dl-icon" id="dlIcon">📘</div>
    <div class="dl-type-label" id="dlType">PDF</div>
    <div class="dl-name" id="dlName">File ka naam</div>
    <div class="dl-meta" id="dlMeta"><b>Size</b> · Extra</div>

    <a href="#" class="dl-download-btn" id="dlActualLink">⬇ Download Now</a>
    <div class="dl-note">File seedha aapke device par save hoga.</div>
  </div>

  <footer>
    <a href="index.html" class="dl-back">← Sabhi files par wapas jaao</a>
  </footer>

<script>
  function getParam(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || '';
  }

  const name = getParam('name') || 'File';
  const type = getParam('type') || 'FILE';
  const size = getParam('size') || '-';
  const extra = getParam('extra') || '-';
  const link = getParam('link') || '#';

  document.getElementById('dlName').textContent = name;
  document.getElementById('dlType').textContent = type;
  document.getElementById('dlMeta').innerHTML = '<b>' + size + '</b>' + (extra && extra !== '-' ? ' · ' + extra : '');
  document.getElementById('dlIcon').textContent = type.toUpperCase() === 'APK' ? '📱' : '📘';
  document.getElementById('dlActualLink').setAttribute('href', link);
  document.title = name + ' — Download';
</script>

</body>
</html>
